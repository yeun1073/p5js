<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 p5.js 작품 모음 🍕</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 둥둥 떠다니는 배경 장식 -->
  <div class="bg-deco">
    <span class="float-shape s1">🍕</span>
    <span class="float-shape s2">⭐</span>
    <span class="float-shape s3">☁️</span>
    <span class="float-shape s4">🍕</span>
    <span class="float-shape s5">⭐</span>
    <span class="float-shape s6">☁️</span>
  </div>

  <header class="site-header">
    <div class="badge">P5.JS GALLERY</div>
    <h1>나의 p5.js 작품 🍕✨</h1>
    <p class="subtitle">피자와 나의 자화상으로 만든 정적 &amp; 동적 작품 모음</p>
  </header>

  <main id="projects">
    <!-- 과제 1 (정적) -->
    <article class="cell">
      <div class="cell-tag">과제 1 · 정적</div>
      <div class="frame">
        <iframe src="sample1/index.html" title="과제 1"></iframe>
      </div>
    </article>

    <!-- 과제 4 (동적) -->
    <article class="cell">
      <div class="cell-tag">과제 4 · 동적</div>
      <div class="frame">
        <iframe src="sample4/index.html" title="과제 4"></iframe>
      </div>
    </article>

    <!-- 과제 2 (정적) -->
    <article class="cell">
      <div class="cell-tag">과제 2 · 정적</div>
      <div class="frame">
        <iframe src="sample2/index.html" title="과제 2"></iframe>
      </div>
    </article>

    <!-- 과제 3 (동적) -->
    <article class="cell">
      <div class="cell-tag">과제 3 · 동적</div>
      <div class="frame">
        <iframe src="sample3/index.html" title="과제 3"></iframe>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <p>made with 🍕 &amp; p5.js</p>
  </footer>

  <script>
    // 각 iframe 안의 600x400 p5 캔버스를 프레임 폭에 맞게 비율 유지하며 축소
    function fitFrames() {
      document.querySelectorAll('.frame').forEach(function (frame) {
        var iframe = frame.querySelector('iframe');
        if (!iframe) return;
        var scale = frame.clientWidth / 600; // 캔버스 원본 폭 600 기준
        iframe.style.width = '600px';
        iframe.style.height = '400px';
        iframe.style.transformOrigin = 'top left';
        iframe.style.transform = 'scale(' + scale + ')';
      });
    }
    window.addEventListener('load', fitFrames);
    window.addEventListener('resize', fitFrames);
  </script>
</body>
</html>
